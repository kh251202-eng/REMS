<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Railway Booking System</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="overlay"></div>

  <nav class="navbar">

    <div class="logo">
      <i class="fa-solid fa-train"></i>
      <span>RAILWAY</span>
    </div>

    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>

  </nav>

  <div class="container">

    <h1>BOOKING MANAGEMENT SYSTEM</h1>

    <div class="booking-form">

      <div class="input-box">
        <label>FROM</label>
        <input type="text" placeholder="Enter City">
      </div>

      <div class="input-box">
        <label>TO</label>
        <input type="text" placeholder="Destination">
      </div>

      <div class="input-box">
        <label>TRAVEL DATE</label>
        <input type="date">
      </div>

      <div class="input-box">
        <label>PASSENGERS</label>
        <input type="number" placeholder="1">
      </div>

    </div>

    <button class="search-btn">
      SEARCH AVAILABLE TRAINS
    </button>

    <div class="index-footer-links">
      <a href="#" class="footer-link"><i class="fa-solid fa-envelope"></i> Contact information</a>
      
      <div class="social-links">
        <a href="#" class="footer-link"><i class="fa-brands fa-facebook"></i></a>
        <a href="#" class="footer-link"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="#" class="footer-link"><i class="fa-brands fa-instagram"></i></a>
        <span class="link-label">Social media links</span>
      </div>

      <a href="#" class="footer-link"><i class="fa-solid fa-universal-access"></i> Accessibility link</a>
    </div>

  </div>

  <div class="promo-banner">
    <div class="promo-content">
      <span class="promo-tag">LIMITED TIME OFFER</span>
      <p class="promo-text">Get 20% off on your first high-speed train booking! Use code: <strong>TRAIN20</strong></p>
    </div>
  </div>

</body>
</html>
